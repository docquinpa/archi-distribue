spring.application.name=vehicules
server.port=${SERVER_PORT:8081}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/vehicules}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:vehicules}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:vehicules}

spring.jpa.hibernate.ddl-auto=validate

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

management.otlp.metrics.export.enabled=${OTLP_METRICS_EXPORT_ENABLED:false}
management.tracing.sampling.probability=${OTLP_TRACING_SAMPLING:1.0}
logging.structured.format.console=logstash

spring.graphql.path=/graphql

app.security.enabled=${APP_SECURITY_ENABLED:true}
spring.security.oauth2.resourceserver.jwt.issuer-uri=${JWT_ISSUER_URI:http://keycloak:8080/realms/LoCarE}

app.kafka.enabled=${KAFKA_ENABLED:true}
app.kafka.topic.vehicle=${KAFKA_TOPIC_VEHICLE:vehicule_topic}
app.kafka.group-id=${KAFKA_GROUP_ID:vehicules-service}

spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=${app.kafka.group-id}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=fr.univrouen.vehicules.vehicle.messaging
spring.kafka.consumer.properties.spring.json.value.default.type=fr.univrouen.vehicules.vehicle.messaging.VehicleEvent
spring.kafka.consumer.properties.spring.json.use.type.headers=false
