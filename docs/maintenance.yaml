openapi: 3.0.3
info:
  title: Maintenance Service API
  version: 1.0.0
  description: API REST du microservice Maintenance (interventions sur véhicules)

servers:
  - url: http://maintenance-service:3000

paths:
  /interventions:
    get:
      summary: Liste toutes les interventions
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Liste des interventions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Intervention'

    post:
      summary: Crée une nouvelle intervention
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InterventionInput'
      responses:
        '201':
          description: Intervention créée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Intervention'

  /interventions/{id}:
    get:
      summary: Récupère une intervention par ID
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Détails de l'intervention
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Intervention'
        '404':
          description: Intervention non trouvée

    put:
      summary: Met à jour une intervention
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InterventionInput'
      responses:
        '200':
          description: Intervention mise à jour

    delete:
      summary: Supprime une intervention
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Intervention supprimée

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Intervention:
      type: object
      properties:
        id:
          type: integer
        vehicle_id:
          type: integer
        state:
          type: string
        date:
          type: string
          format: date
        prix:
          type: number
          format: float

    InterventionInput:
      type: object
      required: [vehicle_id, state, date, prix]
      properties:
        vehicle_id:
          type: integer
        state:
          type: string
        date:
          type: string
          format: date
        prix:
          type: number
          format: float
