{{- if .Values.postgresKeycloak.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-keycloak
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-keycloak
  template:
    metadata:
      labels:
        app: postgres-keycloak
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgresKeycloak.image }}
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgresKeycloak.db }}
            - name: POSTGRES_USER
              value: {{ .Values.postgresKeycloak.user }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.postgresKeycloak.password }}
          ports:
            - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-keycloak
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: postgres-keycloak
  ports:
    - port: 5432
      targetPort: 5432
{{- end }}
{{- if .Values.keycloak.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm
  namespace: {{ .Values.namespace }}
data:
  LoCarE-realm.json: |
    {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
        - name: keycloak
          image: {{ .Values.keycloak.image }}
          args: ["start-dev", "--import-realm"]
          env:
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              value: {{ .Values.keycloak.adminUser }}
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              value: {{ .Values.keycloak.adminPassword }}
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL
              value: jdbc:postgresql://{{ .Values.keycloak.db.host }}:5432/{{ .Values.keycloak.db.name }}
            - name: KC_DB_USERNAME
              value: {{ .Values.keycloak.db.user }}
            - name: KC_DB_PASSWORD
              value: {{ .Values.keycloak.db.password }}
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: realm-file
              mountPath: /opt/keycloak/data/import/LoCarE-realm.json
              subPath: LoCarE-realm.json
      volumes:
        - name: realm-file
          configMap:
            name: keycloak-realm
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: keycloak
  ports:
    - port: 8080
      targetPort: 8080
{{- end }}
