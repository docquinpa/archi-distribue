name: Infra CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  validate-infra:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yamllint
        run: |
          sudo apt-get update
          sudo apt-get install -y yamllint

      - name: Lint YAML files
        run: yamllint .

      - name: Validate Docker Compose
        run: docker compose -f infrastructure/docker-compose.yml config -q

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Lint Helm chart
        run: helm lint infrastructure/helm/locare-infra
