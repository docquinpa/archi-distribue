apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-keycloak
  template:
    metadata:
      labels:
        app: postgres-keycloak
    spec:
      containers:
        - name: postgres
          image: postgres:16
          env:
            - name: POSTGRES_DB
              value: keycloak
            - name: POSTGRES_USER
              value: keycloak
            - name: POSTGRES_PASSWORD
              value: keycloak
          ports:
            - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-keycloak
spec:
  selector:
    app: postgres-keycloak
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: timescaledb-localisation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: timescaledb-localisation
  template:
    metadata:
      labels:
        app: timescaledb-localisation
    spec:
      containers:
        - name: timescaledb
          image: timescale/timescaledb:latest-pg16
          env:
            - name: POSTGRES_DB
              value: localisation
            - name: POSTGRES_USER
              value: localisation
            - name: POSTGRES_PASSWORD
              value: localisation
          ports:
            - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: timescaledb-localisation
spec:
  selector:
    app: timescaledb-localisation
  ports:
    - port: 5432
      targetPort: 5432
